[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "reslab"
version = "0.1.0"
description = "Scientific workflow platform built on resdag and git"
requires-python = ">=3.11"
dependencies = [
    "resdag>=0.1.0",
    "click>=8.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov",
]
site = [
    "jinja2>=3.0",
]

[project.scripts]
lab = "reslab.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["src/reslab"]
